name: Publish Daily Digest

on:
  # Manual trigger with file content input
  workflow_dispatch:
    inputs:
      digest_date:
        description: 'Digest date (YYYY-MM-DD)'
        required: true
        type: string

  # Or trigger via push to a staging branch
  push:
    branches:
      - staging
    paths:
      - 'feed.xml'
      - 'digests/**'

permissions:
  contents: write
  pages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "Kabar Digest Bot"
          git config user.email "digest-bot@kabar.dev"

      - name: Commit and push to main
        if: github.ref != 'refs/heads/main'
        run: |
          git checkout main
          git merge ${{ github.ref_name }} --no-edit
          git push origin main

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        if: always()
